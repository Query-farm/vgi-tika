name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out vgi-tika
        uses: actions/checkout@v4
        with:
          path: vgi-tika

      # vgi-tika resolves the farm.query:* SDK artifacts (vgi-core, vgirpc,
      # vgirpc-oauth) from mavenLocal. Build them from source here and publish
      # to ~/.m2, mirroring `make publish-deps-local`. vgi-java composite-includes
      # vgi-rpc-java at ../Development/vgi-rpc-java, so reproduce that layout.
      - name: Check out vgi-java
        uses: actions/checkout@v4
        with:
          repository: query-farm/vgi-java
          ref: main
          path: vgi-java
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check out vgi-rpc-java
        uses: actions/checkout@v4
        with:
          repository: query-farm/vgi-rpc-java
          ref: main
          path: Development/vgi-rpc-java
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Publish SDK deps to mavenLocal
        env:
          VGI_RPC_JAVA_DIR: ${{ github.workspace }}/Development/vgi-rpc-java
        run: |
          cd "$GITHUB_WORKSPACE/Development/vgi-rpc-java" && ./gradlew --no-daemon publishToMavenLocal
          cd "$GITHUB_WORKSPACE/vgi-java"                 && ./gradlew --no-daemon publishToMavenLocal

      - name: Install Tesseract (OCR smoke coverage)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Java unit tests
        working-directory: vgi-tika
        run: ./gradlew --no-daemon test

      - name: Build fat JAR + boot smoke test
        working-directory: vgi-tika
        run: |
          ./gradlew --no-daemon shadowJar
          JAR=$(ls build/libs/vgi-tika-*-all.jar)
          java --add-opens=java.base/java.nio=ALL-UNNAMED -jar "$JAR" \
              --http --host 127.0.0.1 --port 18100 > /tmp/worker.log 2>&1 &
          WPID=$!
          for i in $(seq 1 15); do
            sleep 1
            if curl -fsS http://127.0.0.1:18100/health > /tmp/health.json; then break; fi
          done
          kill $WPID 2>/dev/null || true
          cat /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
