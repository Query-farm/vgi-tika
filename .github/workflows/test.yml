name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The VGI Java SDK (farm.query:vgi, farm.query:vgirpc) is published to Maven
# Central, so this build is fully self-contained — no sibling-repo checkout,
# no mavenLocal, no composite build. A clean runner just resolves from Central.
#
# The SQL end-to-end suite (test/sql/*.test) runs against the worker fat JAR
# through the real signed `vgi` DuckDB community extension via a prebuilt
# standalone `haybarn-unittest` — no C++ extension build. See ci/README.md.

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Tesseract (OCR is exercised but optional — guarded to NULL)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Java unit tests
        run: ./gradlew --no-daemon test

      - name: Build fat JAR
        run: ./gradlew --no-daemon shadowJar

      - name: Boot smoke test (HTTP health)
        run: |
          JAR=$(ls build/libs/vgi-tika-*-all.jar)
          # The fat JAR manifest sets Add-Opens, so no --add-opens needed here.
          java -jar "$JAR" --http --host 127.0.0.1 --port 18100 > /tmp/worker.log 2>&1 &
          WPID=$!
          for i in $(seq 1 20); do
            sleep 1
            if curl -fsS http://127.0.0.1:18100/health > /tmp/health.json; then break; fi
          done
          kill $WPID 2>/dev/null || true
          cat /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json

  # Resolve the latest published haybarn release once, so the suite always tests
  # the current standalone runner (and we never hardcode/pin it).
  resolve-haybarn:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  # SQL E2E: build the worker fat JAR, then run the sqllogictest suite against it
  # through the real signed `vgi` community extension via standalone haybarn.
  #
  # The SAME suite runs once per VGI transport (subprocess/stdio, HTTP, AF_UNIX
  # launcher). The vgi extension picks the transport from the worker LOCATION:
  #   subprocess -> `java -jar <jar>`        (DuckDB spawns it, Arrow over stdio)
  #   http       -> `http://127.0.0.1:<p>`   (we boot `--http`, wait /health 200)
  #   unix       -> `unix://<sock>`          (we boot `--unix <sock>`, wait sock)
  # The vgi Java SDK Worker.runFromArgs supports --http/--host/--port (serves
  # /health) and --unix <path>. See ci/README.md.
  integration:
    needs: resolve-haybarn
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        transport: [subprocess, http, unix]
    name: SQL E2E (${{ matrix.transport }})
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Tesseract (OCR is exercised but optional — guarded to NULL)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Build worker fat JAR
        run: ./gradlew --no-daemon shadowJar

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern 'haybarn_unittest-linux-amd64.zip' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner, and (subprocess) DuckDB spawns the worker
          # LOCATION as a subprocess — so both must be absolute. For http/unix
          # the script boots the JAR itself (cwd = stage dir).
          UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
          chmod +x "$UNITTEST"
          JAR="$PWD/$(ls build/libs/vgi-tika-*-all.jar | head -1)"
          echo "Worker JAR: $JAR"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          # subprocess transport uses this stdio command; http/unix derive the
          # JAR path from it (or from VGI_TIKA_WORKER_JAR). The fat JAR manifest
          # sets Add-Opens, so a bare `java -jar` works.
          echo "VGI_TIKA_WORKER=java -jar $JAR" >> "$GITHUB_ENV"
          echo "VGI_TIKA_WORKER_JAR=$JAR" >> "$GITHUB_ENV"

      - name: Run SQL E2E suite
        run: ci/run-integration.sh
        env:
          TRANSPORT: ${{ matrix.transport }}

  # Metadata quality: build the worker fat JAR (same build as the integration
  # job) and run the vgi-lint metadata linter against it as a subprocess/stdio
  # worker (`java -jar <abs jar>`). The linter force-installs the signed `vgi`
  # community extension itself and fails the job on any finding at info or above.
  metadata-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Tesseract (OCR is exercised but optional — guarded to NULL)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Build worker fat JAR
        run: ./gradlew --no-daemon shadowJar

      - name: Resolve worker launch command
        run: |
          JAR="$PWD/$(ls build/libs/vgi-tika-*-all.jar | head -1)"
          echo "Worker JAR: $JAR"
          # The fat JAR manifest sets Add-Opens, so a bare `java -jar` works.
          echo "VGI_TIKA_WORKER=java -jar $JAR" >> "$GITHUB_ENV"

      - name: vgi-lint
        uses: Query-farm/vgi-lint-check@v1
        with:
          location: ${{ env.VGI_TIKA_WORKER }}
          fail-on: info
          version: "0.37.0"
