# vgi-lint-check configuration for the vgi-tika worker.
#
# Discovered automatically by the `Query-farm/vgi-lint-check` GitHub Action
# (see .github/workflows/test.yml) and by a local `vgi-lint lint` run from the
# repo root. CLI flags still override anything set here.

[tool.vgi-lint-check]
# NOTE: this worker used to waive VGI146 (table-functions-without-browsable-table).
# Every function here requires a document argument (a path or a BLOB), so there is
# no honest "default data slice" to expose as a browsable table — and the one object
# that would have satisfied the rule, a view cataloguing the worker's own functions,
# is what VGI327 forbids. That tension is resolved upstream: since vgi-lint-check
# 0.74.0 VGI146 honours the escape hatch its own fix hint names and stands down when
# every table function carries a described example and documented arguments, which
# this worker does. Waiver removed after `vgi-lint --audit-waivers` reported it dead.
